name: Validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Task prompt token length check
        run: python scripts/check_task_tokens.py

      - name: Scorer unit tests
        run: python -m unittest discover -s tests -v
